<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login — Central Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/hospital.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<nav aria-label="Admin">
  <div class="logo"><h1><span class="pulse-dot" aria-hidden="true"></span> Central Care <span style="font-family: var(--font-mono); font-size:0.7rem; color: var(--ink-soft);">/ staff</span></h1></div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
    <button class="btn btn-outline" id="logoutBtn" style="display:none;">Log out</button>
  </div>
</nav>

<main class="container" style="padding: 48px 24px 80px;">

  <!-- LOGIN VIEW -->
  <section id="loginView" style="max-width:420px; margin: 40px auto;">
    <div class="section-head" style="margin-bottom:28px;">
      <span class="eyebrow">Staff access</span>
      <h2>Log in</h2>
      <p>Manage appointments and doctors.</p>
    </div>
    <form id="loginForm" class="appointment-wrap" style="padding:32px;">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Log in</button>
      <div class="form-status" id="loginStatus"></div>
      <p class="slot-hint" style="margin-top:14px;">Default demo login: <strong>admin</strong> / <strong>admin123</strong></p>
    </form>
  </section>

  <!-- DASHBOARD VIEW -->
  <section id="dashboardView" style="display:none;">
    <div class="section-head" style="text-align:left; margin: 0 0 30px;">
      <span class="eyebrow">Dashboard</span>
      <h2>Appointments</h2>
    </div>

    <div class="dash-toolbar">
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="date" id="dateFilter">
      <button class="btn btn-outline" id="refreshBtn">Refresh</button>
      <button class="btn btn-primary" id="addDoctorBtn" style="margin-left:auto;">+ Add doctor</button>
    </div>

    <div class="table-wrap">
      <table id="apptTable">
        <thead>
          <tr>
            <th>Patient</th><th>Phone</th><th>Doctor</th><th>Date</th><th>Time</th><th>Status</th><th>Notes</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="apptTableBody">
          <tr><td colspan="8" class="loading-cell">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- ADD DOCTOR MODAL -->
  <div id="doctorModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h3>Add a doctor</h3>
      <form id="addDoctorForm">
        <div class="form-row"><label for="docName">Name</label><input type="text" id="docName" required></div>
        <div class="form-row"><label for="docSpec">Specialization</label><input type="text" id="docSpec" required></div>
        <div class="form-row"><label for="docExp">Years of experience</label><input type="number" id="docExp" min="0" value="5" required></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button type="submit" class="btn btn-primary">Save doctor</button>
          <button type="button" class="btn btn-outline" id="closeModalBtn">Cancel</button>
        </div>
        <div class="form-status" id="doctorFormStatus"></div>
      </form>
    </div>
  </div>

</main>

<script src="js/admin.js"></script>
</body>
</html>
